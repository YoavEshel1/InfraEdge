<div class="task-card" [ngClass]="priorityClass">
  <!-- Header: title + priority badge -->
  <div class="card-header">
    <h3 class="task-title">{{ task().title }}</h3>
    <span class="priority-badge" [ngClass]="priorityClass">{{ priorityLabel }}</span>
  </div>

  <mat-divider />

  <!-- Footer: status selector + delete -->
  <div class="card-footer">
    <mat-form-field appearance="outline" subscriptSizing="dynamic" class="status-field">
      <mat-select [value]="task().status" (selectionChange)="onStatusChange($event.value)">
        @for (s of statuses; track s.status) {
        <mat-option [value]="s.status">{{ s.label }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <button mat-icon-button class="delete-btn" 
    matTooltip="מחק משימה" (click)="onDelete()" aria-label="מחק משימה">
      <mat-icon>delete</mat-icon>
    </button>
  </div>
</div>
